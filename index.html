<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <header class="main-header">
    <div class="logo-container">
      <img src="/assets/logo.svg" alt="Furniro Logo">
      <h1>Furniro</h1>
    </div>

    <nav class="nav-menu">
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>

    <div class="header-icons">
      <a href="#" aria-label="Perfil"><img src="/assets/user.svg" alt=""></a>
      <a href="#" aria-label="Buscar"><img src="/assets/search.svg" alt=""></a>
      <a href="#" aria-label="Favoritos"><img src="/assets/heart.svg" alt=""></a>
      <a href="#" aria-label="Carrinho"><img src="/assets/cart.svg" alt=""></a>
    </div>
  </header>

  <main>

    <section class="hero-section">
      <div class="hero-card">
        <span>New Arrival</span>
        <h2>Discover Our <br> New Collection</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut elit tellus, luctus nec ullamcorper mattis.</p>
        <button class="btn-buy">BUY NOW</button>
      </div>
    </section>

   <section class="categories-section">
    
    <div class="text-section">
      <h2>Browse The Range</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    </div>

    <div class="categories-container">
      
      <figure class="category-card">
        <img src="/assets/background-2.svg" alt="Sala de jantar decorada no estilo Furniro">
        <figcaption>Dining</figcaption>
      </figure>

      <figure class="category-card">
        <img src="/assets/background-3.svg" alt="Sala de estar aconchegante com sofá bege">
        <figcaption>Living</figcaption>
      </figure>

      <figure class="category-card">
        <img src="/assets/background-4.svg" alt="Quarto com decoração rústica e plantas">
        <figcaption>Bedroom</figcaption>
      </figure>

    </div>

  </section>

  </main>
  

  <script src="/index.js"></script>
</body>
</html>
